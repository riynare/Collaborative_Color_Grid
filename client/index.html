<!DOCTYPE html>
<html lang = "ru">
<head>
    <meta charset = "UTF-8" />
    <meta name = "viewport" content = "width=device-width, initial-scale=1.0" />
    <title>Collaborative Color Grid</title>
    <link rel="stylesheet" href="styles.css">

</head>

<body>
    <header>
        <h1>Collaborative Color Grid</h1>
    </header>

    <main class="layout">
        <div id="grid"></div>
        <ul id="colorMenu" class="hidden">
            <li data-color="red">Red</li>
            <li data-color="green">Green</li>
            <li data-color="blue">Blue</li>
            <li data-color="yellow">Yellow</li>
            <li data-color="orange">Orange</li>
            <li data-color="purple">Purple</li>
            <li data-color="black">Black</li>
            <li data-color="pink">Pink</li>
            <li data-color="aqua">Aqua</li>
            <li data-color="brown">Brown</li>
        </ul>
        <section id="log">

        </section>
    </main>
    <script src="script.js"></script>
    <script src="color-picker.js"></script>
</body>
</html>
